<!doctype html>
<html>
  <head>
    <title>Prime Map</title>
    <link href="./prime-map.css" rel="stylesheet" type="text/css">
    <script src="./jquery-3.6.0-min.js" type="text/javascript"></script>
    <script src="./prime-map.js" type="text/javascript"></script>
  </head>
  <body>
    <div>
      <div class="holder">
        <label for="base">Base Value:</label>
        <input type="number" id="base" min="1" max="250" value="25" onchange="listPrimes();showPrimeMap();"/>
      </div>
      <div class="holder">
        <label for="multiplier">Multiplier:</label>
        <input type="number" id="multiplier" min = "1" max="250" value="3" onchange="showPrimeMap();"/>
      </div>
      <div class="holder">
        <label for="all">all</label>
        <input type="radio" id="all" name="filter" checked/>
        <label for="top">top</label>
        <input type="radio" id="top" name="filter"/>
        <label for="bottom">bottom</label>
        <input type="radio" id="bottom" name="filter"/>
      </div>
    </div>
    <div class="holder">
      <input type="button" value="Show Primes" onclick="listPrimes();">
    </div>
    <div class="holder">
      <input type="button" value="Show Map" onclick="showPrimeMap();">
    </div>
    <div id="primes" class="holder">
    </div>
      <span>Qualifer: </span><span id="qualifer"></span>
    </div>
    <div>
      <span>Actual: </span><span id="actual"></span>
      <span>Expected: </span><span id="expected"></span>
    </div>
    <div id="mapContainer" class="holder">
    </div>
  </body>
</html>
